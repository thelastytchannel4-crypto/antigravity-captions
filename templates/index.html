{% extends 'base.html' %}
{% block content %}
<div class="astronaut">🧑‍🚀</div>
<h1 class="title-text">ANTIGRAVITY CAPTIONS</h1>

{% if error %}
<div class="error-msg" style="display:block; margin-bottom: 1rem;">{{ error }}</div>
{% endif %}

<div class="glass-panel floating">
    <h2>UPLOAD YOUR VIDEO</h2>
    <p>We'll add subtitles that defy gravity.</p>
    
    <div class="upload-area" id="drop-zone">
        <h3>Drag & Drop video here</h3>
        <p>or click to browse</p>
        <p style="font-size: 0.8rem; opacity: 0.7;">MP4, MOV, AVI (Max 500MB)</p>
        <input type="file" id="file-input" style="display: none;" accept=".mp4,.mov,.avi">
    </div>
    
    <div id="error-message" class="error-msg"></div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const errorMsg = document.getElementById('error-message');
    
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleUpload(e.dataTransfer.files[0]);
        }
    });
    
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            handleUpload(fileInput.files[0]);
        }
    });
    
    function handleUpload(file) {
        errorMsg.style.display = 'none';
        
        if (file.size > 500 * 1024 * 1024) {
            errorMsg.innerText = 'File is too large! Maximum allowed is 500MB.';
            errorMsg.style.display = 'block';
            return;
        }
        
        const formData = new FormData();
        formData.append('video', file);
        
        dropZone.innerHTML = '<h3>Uploading... launching into space 🚀</h3>';
        
        fetch('/upload', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                dropZone.innerHTML = '<h3>Drag & Drop video here</h3><p>or click to browse</p>';
                errorMsg.innerText = data.error;
                errorMsg.style.display = 'block';
            } else {
                window.location.href = '/processing/' + data.task_id;
            }
        })
        .catch(err => {
            dropZone.innerHTML = '<h3>Drag & Drop video here</h3><p>or click to browse</p>';
            errorMsg.innerText = 'Upload failed. Space dust interference?';
            errorMsg.style.display = 'block';
        });
    }
</script>
{% endblock %}
