{% extends 'base.html' %}
{% block content %}
<h1 class="title-text" style="font-size: 2.5rem; margin-bottom: 1rem;">YOUR VIDEO IS READY</h1>

<div class="glass-panel floating" style="width: 80%; max-width: 900px; padding: 2rem;">
    <div class="video-container">
        <video controls autoplay crossorigin="anonymous">
            <source src="{{ url_for('uploaded_file', filename=video_file) }}" type="video/mp4">
            <track label="English" kind="subtitles" srclang="en" src="{{ url_for('uploaded_file', filename=task_id + '.vtt') }}" default>
            Your browser does not support the video tag.
        </video>
    </div>
    
    <div style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 2rem;">
        <a href="/download/{{ task_id }}/srt" class="btn">⬇️ Download SRT</a>
        <a href="/download/{{ task_id }}/vtt" class="btn">⬇️ Download VTT</a>
        <a href="/" class="btn" style="border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(181,0,255,0.2);">🚀 Upload Another</a>
    </div>
</div>

<style>
/* Style the subtitles inside video player */
video::cue {
    background-color: var(--glass-bg);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    text-shadow: 0 0 10px var(--neon-blue);
}
</style>
{% endblock %}
